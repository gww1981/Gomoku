<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五子棋 - 经典木纹风格</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <!-- 顶部控制栏 -->
    <header class="header">
      <h1>五子棋</h1>
      <div class="header-controls">
        <!-- 模式切换 -->
        <div class="mode-selector">
          <button type="button" class="mode-btn active" data-mode="pvp">双人</button>
          <button type="button" class="mode-btn" data-mode="ai">人机</button>
        </div>
        <!-- 难度选择（仅人机模式显示） -->
        <select id="difficulty" class="difficulty-select" style="display: none;">
          <option value="easy">简单</option>
          <option value="medium" selected>中等</option>
          <option value="hard">困难</option>
        </select>
        <!-- 重新开始按钮 -->
        <button type="button" id="restart">重新开始</button>
      </div>
    </header>

    <!-- 状态提示 -->
    <div id="status">黑方的回合</div>

    <!-- 棋盘区域 -->
    <div id="board" class="board"></div>
  </div>

  <!-- 引入游戏依赖 -->
  <script src="js/game.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
