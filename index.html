<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五子棋 - 经典木纹风格</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <!-- 顶部控制栏 -->
    <header class="header">
      <h1>五子棋</h1>
      <div class="header-controls">
        <!-- 模式切换 -->
        <div class="mode-selector">
          <button type="button" class="mode-btn active" data-mode="pvp">双人</button>
          <button type="button" class="mode-btn" data-mode="ai">人机</button>
        </div>
        <!-- 难度选择（仅人机模式显示） -->
        <select id="difficulty" class="difficulty-select hidden">
          <option value="easy">简单</option>
          <option value="medium" selected>中等</option>
          <option value="hard">困难</option>
        </select>
        <!-- 重新开始按钮 -->
        <button type="button" id="restart">重新开始</button>
        <button type="button" id="settings" aria-label="背景设置">⚙️</button>
      </div>
    </header>

    <!-- 状态提示 -->
    <div id="status">黑方的回合</div>

    <!-- 棋盘区域 -->
    <div id="board" class="board"></div>
  <!-- 背景设置弹窗 -->
  <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="settings-title">设置</h2>
        <button type="button" id="close-modal" class="close-btn">×</button>
      </div>

      <!-- Tab 切换器 -->
      <div class="modal-tabs">
        <button type="button" class="tab-btn active" data-tab="background">背景</button>
        <button type="button" class="tab-btn" data-tab="music">音乐</button>
        <button type="button" class="tab-btn" data-tab="replay">录像</button>
      </div>

      <div class="modal-body">
        <!-- 背景 Tab 面板 -->
        <div class="tab-panel" data-panel="background">
          <h3>预设背景</h3>
          <div class="bg-grid">
            <div class="bg-option" data-bg="preset-1" aria-label="预设背景1" style="background-image: url('https://images.unsplash.com/photo-1549490349-8643362247b5?w=800')"></div>
            <div class="bg-option" data-bg="preset-2" aria-label="预设背景2" style="background-image: url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800')"></div>
            <div class="bg-option" data-bg="preset-3" aria-label="预设背景3" style="background-image: url('https://images.unsplash.com/photo-1563865436874-9aef32095fad?w=800')"></div>
            <div class="bg-option" data-bg="preset-4" aria-label="预设背景4" style="background-image: url('https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?w=800')"></div>
          </div>
          <h3>自定义背景</h3>
          <div class="upload-area">
            <input type="file" id="bg-upload" accept="image/jpeg,image/png,image/webp" hidden>
            <button type="button" id="upload-btn" class="upload-btn">📁 选择图片</button>
            <p class="upload-hint">支持 JPG、PNG、WebP，最大 2MB</p>
          </div>
        </div>

        <!-- 音乐 Tab 面板 -->
        <div class="tab-panel hidden" data-panel="music">
          <h3>预设音乐</h3>
          <div class="music-list" id="music-list">
            <!-- 动态生成 -->
          </div>

          <h3>自定义音乐</h3>
          <div class="upload-area">
            <input type="file" id="music-upload" accept="audio/mpeg,audio/wav,audio/ogg" hidden>
            <button type="button" id="upload-music-btn" class="upload-btn">📁 选择音乐文件</button>
            <p class="upload-hint">支持 MP3、WAV、OGG，最大 10MB</p>
          </div>

          <h3>播放控制</h3>
          <div class="music-controls">
            <div class="now-playing">
              <span id="current-track-name">未选择</span>
            </div>
            <div class="control-buttons">
              <button type="button" id="prev-btn" class="control-btn">⏮</button>
              <button type="button" id="play-btn" class="control-btn play-btn">▶</button>
              <button type="button" id="next-btn" class="control-btn">⏭</button>
            </div>
            <div class="volume-control">
              <button type="button" id="mute-btn" class="control-btn">🔊</button>
              <input type="range" id="volume-slider" min="0" max="100" value="50">
            </div>
          </div>
        </div>

        <!-- 录像 Tab 面板 -->
        <div class="tab-panel hidden" data-panel="replay">
          <h3>历史录像</h3>
          <div id="replay-list" class="replay-list">
            <p class="replay-empty">暂无录像</p>
          </div>
          <button type="button" id="clear-replays" class="btn-danger">清空录像</button>
        </div>

        <!-- 音乐 Tab 面板 -->
        <div class="tab-panel hidden" data-panel="music">
          <h3>预设音乐</h3>
          <div class="music-list" id="music-list">
            <!-- 动态生成 -->
          </div>

          <h3>自定义音乐</h3>
          <div class="upload-area">
            <input type="file" id="music-upload" accept="audio/mpeg,audio/wav,audio/ogg" hidden>
            <button type="button" id="upload-music-btn" class="upload-btn">📁 选择音乐文件</button>
            <p class="upload-hint">支持 MP3、WAV、OGG，最大 10MB</p>
          </div>

          <h3>播放控制</h3>
          <div class="music-controls">
            <div class="now-playing">
              <span id="current-track-name">未选择</span>
            </div>
            <div class="control-buttons">
              <button type="button" id="prev-btn" class="control-btn">⏮</button>
              <button type="button" id="play-btn" class="control-btn play-btn">▶</button>
              <button type="button" id="next-btn" class="control-btn">⏭</button>
            </div>
            <div class="volume-control">
              <button type="button" id="mute-btn" class="control-btn">🔊</button>
              <input type="range" id="volume-slider" min="0" max="100" value="50">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- 引入游戏依赖 -->
  <script src="js/game.js" defer></script>
  <script src="js/ai.js" defer></script>
  <script src="js/replay.js" defer></script>
  <script src="js/ui.js" defer></script>
</body>
</html>
