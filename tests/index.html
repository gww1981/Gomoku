<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Gomoku - QUnit Tests</title>
  <link rel="stylesheet" href="lib/qunit.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="qunit"></div>
  <div id="qunit-fixture"></div>
  <div id="board"></div>
  <div id="status-bar">
    <span id="status">选择模式后点击开始</span>
    <span id="status-actions"></span>
  </div>
  <button id="start-btn" class="start-btn" style="display:none;"></button>
  <button id="restart-btn" style="display:none;"></button>
  <button id="undo-btn" style="display:none;"></button>
  <select id="difficulty"></select>
  <button id="settings"></button>
  <div class="mode-selector">
    <button type="button" class="mode-btn active" data-mode="pvp">双人</button>
    <button type="button" class="mode-btn" data-mode="ai">人机</button>
  </div>
  <span id="timer-black"></span>
  <span id="timer-white"></span>
  <script src="lib/qunit.js"></script>
  <script>
    window.initAudioManager = function() {};
    window.initReplayManager = function() {};
    window.initSettingsModal = function() {};
    window.getAIMove = function() { return null; };
  </script>
  <script src="../js/game.js?_t=2"></script>
  <script src="../js/ui-music.js"></script>
  <script src="../js/ui-core.js"></script>
  <script src="board.test.js"></script>
  <script src="ui-core-last-move.test.js"></script>
  <script src="audio-manager.test.js"></script>
  <script src="ui-core-mode-selection.test.js"></script>
</body>
</html>
